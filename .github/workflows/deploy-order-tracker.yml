name: Deploy Order Tracker Function

on:
    push:
        branches:
        - main
        paths:
        - 'order-tracker-function/**'
        - '.github/workflows/deploy-order-tracker.yml'
    workflow_dispatch: # allow manual execution

jobs:
    deploy-order-tracker:
        name: Deploy Order tracker Function
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repo
          uses: actions/checkout@v3

        - name: Setup NodeJs
          uses: actions/setup-node@v4
          with:
                node-version: 20.x

        - name: Install dependencies
          working-directory:  order-tracker-function
          run: npm install
        
        - name: Deploy function to Azure
          uses: azure/functions-action@v1
          with:
            app-name: 'order-system-order-tracker-func-bur-dev'
            package: './order-tracker-function'
            publish-profile: ${{ secrets.ORDER_TRACKER_AZURE_FUNCTION_APP_PUBLISH_PROFILE }}