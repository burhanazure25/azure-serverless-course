name: Deploy Azure Infrastructure

on:
    push:
        branches:
        - main
        paths:
        - 'infra/**'
        - '.github/workflows/deploy-infra.yml'
    workflow_dispatch: # allow manual execution

jobs:
    deploy-infra:
        name: Deploy Terrafrorm Infrastructure
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repository
          uses: actions/checkout@v3

        - name: Set up Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: 1.15.7

        - name: Azure Authentication
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

        - name: Terraform Init Upgrade
          working-directory: ./infra
          run: terraform init -upgrade -reconfigure

        # - name: Terraform Init
        #   working-directory: ./infra
        #   run: terraform init

        - name: Terraform validate
          working-directory: ./infra
          run: terraform validate

        - name: Terraform Plan
          working-directory: ./infra
          run: terraform plan -out=tfplan -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

        - name: Terraform Apply
          working-directory: ./infra
          run: terraform apply -auto-approve tfplan -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"